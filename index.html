<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AI Compass – BitAgorà Orobica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef1f5;
      padding: 1em;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #181818;
      color: #e0e0e0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2em;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin: 0.5em 0;
    }
    header img {
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
      margin-bottom: 2em;
    }
    .controls input,
    .controls select,
    .controls button {
      font-size: 1em;
      padding: 0.5em;
      flex: 1 1 200px;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border 0.3s;
    }
    .controls input:hover,
    .controls select:hover {
      border-color: #007acc;
    }
    .entry {
      background: #ffffff;
      border-radius: 12px;
      padding: 1em;
      margin-bottom: 1.5em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }
    .entry[data-category="News"] {
      border-left-color: #007acc;
    }
    .entry[data-category="Paper"] {
      border-left-color: #e67e22;
    }
    .entry[data-category="Course"] {
      border-left-color: #27ae60;
    }
    .entry[data-category="Automation"] {
      border-left-color: #9b59b6; /* viola brillante */
    }
    body.dark .entry {
      background: #1e1e1e;
    }
    .entry .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #007acc;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5em;
    }
    body.dark .title {
      color: #4fc3f7;
    }
    .entry p {
      margin: 0.5em 0;
      line-height: 1.4;
    }
    .entry .meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 0.5em;
    }
    body.dark .meta {
      color: #aaa;
    }
    .entry .badge {
      margin-right: 0.5em;
      font-size: 1.2em;
    }
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls input,
      .controls select,
      .controls button {
        flex: 1 1 auto;
        max-width: 100%;
      }
    }
    
    .entries-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5em;
    }
    @media (min-width: 700px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (min-width: 1000px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}
.entry {
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s ease;
  opacity: 0;
}
.entry.show {
  opacity: 1;
}
.entry:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}
  
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Compass</h1>
    <img src="logo.png" alt="Logo">
  </header>
  <p><em>Selezione curata da <a href="https://www.bitagoraorobica.it" target="_blank">BitAgorà Orobica srl</a></em></p>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca per titolo o descrizione...">
    <select id="category">
      <option value="">Tutte le categorie</option>
      <option value="News">News</option>
      <option value="Paper">Paper</option>
      <option value="Course">Course</option>
      <option value="Automation">Automation</option>
    </select>
    <select id="source">
      <option value="">Tutte le fonti</option>
      <option value="BitAgorà Orobica">BitAgorà Orobica</option>
      <option value="OpenAI">OpenAI</option>
      <option value="YouTube - Gabry Solutions">YouTube - Gabry Solutions</option>
      <option value="YouTube – OpenAI">YouTube – OpenAI</option>
      <option value="YouTube – Raffaele Gaito">YouTube – Raffaele Gaito</option>
      <option value="arXiv AI">arXiv AI</option>
    </select>
    <select id="days">
      <option value="">Qualsiasi data</option>
      <option value="7">Ultimi 7 giorni</option>
      <option value="15">Ultimi 15 giorni</option>
      <option value="30">Ultimi 30 giorni</option>
    </select>
    <button id="toggleDark">🌗 Modalità scura</button>
    <button id="resetFilters">🔄 Reset filtri</button>
  </div>

  <div id="entries" class="entries-grid"></div>

domains such as law. On these tasks, errors arise not only from gaps in world knowledge but also f","category":"Paper","link":"https://arxiv.org/abs/2606.06941","source":"arXiv AI","badge":"📜"},{"date":"2026-06-08","title":"Exploring Agentic Tool-Calling Decisions via Uncertainty-Aligned Reinforcement Learning","description":"arXiv:2606.06976v1 Announce Type: new \nAbstract: Large language model (LLM)-based agents often make suboptimal tool-use decisions, including unsupported tool invocation and hallucinated direct responses, which may accumulate errors throughout multi-step interactions. Existing approaches mainly impro","category":"Paper","link":"https://arxiv.org/abs/2606.06976","source":"arXiv AI","badge":"📜"},{"date":"2026-06-08","title":"OpenAI on OpenAI: Stacie Faggioli, Business Finance Officer Applications, OpenAI","description":"Showcasing how OpenAI’s own finance organization is using AI tools like ChatGPT, ChatGPT for Excel, Codex, and custom agents to re-design finance operations.","category":"News","link":"https://www.youtube.com/watch?v=1NtS2KdnDok","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-08","title":"Operationalizing AI in workflows: Lee Spacagna, Solutions Engineer, OpenAI","description":"How OpenAI’s newest enterprise products, including Workspace Agents and Codex - can operationalize AI across financial services organizations.","category":"News","link":"https://www.youtube.com/watch?v=fAxlEcXiSts","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-08","title":"Frontier Intelligence & Financial Services: Katy Elkin, GTM Lead, OpenAI","description":"OpenAI’s vision for how financial services firms can use AI across three pillars: transforming workflows, amplifying workforce productivity, and building AI-native customer products.","category":"News","link":"https://www.youtube.com/watch?v=ykNmTvRcqPQ","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-08","title":"Multiplying workforce impact: Stephanie Anani, Solutions Engineer, OpenAI","description":"Deployment strategy and organizational transformation: how financial institutions can partner with OpenAI to embed AI into daily workflows, accelerate customer-facing innovation, and scale trusted AI systems across regulated environments.","category":"News","link":"https://www.youtube.com/watch?v=m2TV8slGQKc","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-05","title":"IA e Growth Hacking - Che accoppiata [Luca Barboni]","description":"Compra il mio libro \"In cosa posso esserti utile?\", una guida molto pratica e poco emotiva all'IA https://amzn.to/4aMZrUX\n\nCompra il mio corso \"Crea un Agente AI con Claude Code\": https://www.raffaelegaito.com/claude-code-crea-agente-ai-corso-completo/?landing=true\n\nIn questa puntata di What's Next ","category":"News","link":"https://www.youtube.com/watch?v=7YfjVFEvlTA","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-06-05","title":"Claude Opus 4.8 è una Follia: 7 Casi d’Uso Reali (+ Prompt)","description":"Non usare il nuovo Claude Opus 4.8 prima di vedere questi 7 prompt: in questo video ti mostro come sfruttarlo davvero per programmare, analizzare documenti, automatizzare file e creare deliverable pronti da consegnare.\n\nClaude Opus 4.8 è il nuovo modello di Anthropic: più forte nei task di coding, p","category":"News","link":"https://www.youtube.com/watch?v=uU3M_NJ70XE","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-06-04","title":"Build and share interactive prototypes in Codex","description":"The Product Design plugin for Codex helps teams move from a rough idea to a prototype they can see, refine, and share for feedback.\n\nWith a single install, Codex becomes more useful for product design work, helping teams explore directions, build prototypes, and iterate faster.\n\nLearn more: https://","category":"News","link":"https://www.youtube.com/watch?v=_9ImjmzAyus","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-27","title":"Building self-improving tax agents with Codex","description":"See how OpenAI, Thrive, and Crete built a self-improving tax agent with Codex, automating filings, improving accuracy, and accelerating workflows.","category":"News","link":"https://openai.com/index/building-self-improving-tax-agents-with-codex","source":"OpenAI","badge":"🔥"},{"date":"2026-05-27","title":"Warp’s big bet on building open source with GPT-5.5","description":"Warp uses GPT-5.5 and OpenAI models to coordinate coding agents across local, cloud, and open-source development workflows.","category":"News","link":"https://openai.com/index/warp","source":"OpenAI","badge":"🔥"},{"date":"2026-05-25","title":"OpenAI, Grupo Folha and Grupo UOL announce strategic content partnership","description":"OpenAI partners with Grupo Folha and Grupo UOL to bring trusted Brazilian journalism to ChatGPT, expanding access to news with attribution and transparency.","category":"News","link":"https://openai.com/index/grupo-folha-grupo-uol-partnership","source":"OpenAI","badge":"🔥"},{"date":"2026-05-21","title":"AdventHealth advances whole-person care with OpenAI","description":"AdventHealth is using ChatGPT for Healthcare to streamline workflows, reduce administrative burden, and return more time to patient care.","category":"News","link":"https://openai.com/index/adventhealth","source":"OpenAI","badge":"🔥"},{"date":"2025-07-30","title":"Newsletter BitAgora","description":"Selezione articoli IA","category":"Tool","link":"https://newsletter.bitagoraorobica.it/tag/ia/","source":"BitAgorà Orobica","badge":""}];

    const searchInput = document.getElementById('search');
    const categoryFilter = document.getElementById('category');
    const sourceFilter = document.getElementById('source');
    const daysFilter = document.getElementById('days');
    const toggleDark = document.getElementById('toggleDark');
    const resetFilters = document.getElementById('resetFilters');
    const entriesDiv = document.getElementById('entries');

    function createEntry(item) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.text = (item.title + ' ' + item.description).toLowerCase();
      div.dataset.category = item.category;
      div.dataset.source = item.source;
      div.dataset.date = item.date;
      div.innerHTML = `
        <a href="${item.link}" class="title" target="_blank">
          <span class="badge">${item.badge}</span>${item.title}
        </a>
        <p>${item.description}</p>
        <div class="meta">${item.source} – ${item.date} – ${item.category}</div>
      `;
      return div;
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const src = sourceFilter.value;
      const days = parseInt(daysFilter.value);
      const now = new Date();

      entriesDiv.innerHTML = "";
entryData.forEach(item => {
  const entryDate = new Date(item.date);
  const diffDays = (now - entryDate) / (1000 * 60 * 60 * 24);
  if (
    (!q || (item.title + item.description).toLowerCase().includes(q)) &&
    (!cat || item.category === cat) &&
    (!src || item.source === src) &&
    (isNaN(days) || diffDays <= days)
  ) {
    const el = createEntry(item);
    entriesDiv.appendChild(el);
    // trigger animazione
    requestAnimationFrame(() => el.classList.add("show"));
  }
});

      
      
    }

    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "";
      sourceFilter.value = "";
      daysFilter.value = "";
      render();
    });

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sourceFilter.addEventListener("change", render);
    daysFilter.addEventListener("change", render);
    toggleDark.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>
</body>
</html>
