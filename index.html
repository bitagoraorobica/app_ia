<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AI Compass – BitAgorà Orobica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef1f5;
      padding: 1em;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #181818;
      color: #e0e0e0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2em;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin: 0.5em 0;
    }
    header img {
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
      margin-bottom: 2em;
    }
    .controls input,
    .controls select,
    .controls button {
      font-size: 1em;
      padding: 0.5em;
      flex: 1 1 200px;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border 0.3s;
    }
    .controls input:hover,
    .controls select:hover {
      border-color: #007acc;
    }
    .entry {
      background: #ffffff;
      border-radius: 12px;
      padding: 1em;
      margin-bottom: 1.5em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }
    .entry[data-category="News"] {
      border-left-color: #007acc;
    }
    .entry[data-category="Paper"] {
      border-left-color: #e67e22;
    }
    .entry[data-category="Course"] {
      border-left-color: #27ae60;
    }
    .entry[data-category="Automation"] {
      border-left-color: #9b59b6; /* viola brillante */
    }
    body.dark .entry {
      background: #1e1e1e;
    }
    .entry .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #007acc;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5em;
    }
    body.dark .title {
      color: #4fc3f7;
    }
    .entry p {
      margin: 0.5em 0;
      line-height: 1.4;
    }
    .entry .meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 0.5em;
    }
    body.dark .meta {
      color: #aaa;
    }
    .entry .badge {
      margin-right: 0.5em;
      font-size: 1.2em;
    }
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls input,
      .controls select,
      .controls button {
        flex: 1 1 auto;
        max-width: 100%;
      }
    }
    
    .entries-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5em;
    }
    @media (min-width: 700px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (min-width: 1000px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}
.entry {
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s ease;
  opacity: 0;
}
.entry.show {
  opacity: 1;
}
.entry:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}
  
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Compass</h1>
    <img src="logo.png" alt="Logo">
  </header>
  <p><em>Selezione curata da <a href="https://www.bitagoraorobica.it" target="_blank">BitAgorà Orobica srl</a></em></p>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca per titolo o descrizione...">
    <select id="category">
      <option value="">Tutte le categorie</option>
      <option value="News">News</option>
      <option value="Paper">Paper</option>
      <option value="Course">Course</option>
      <option value="Automation">Automation</option>
    </select>
    <select id="source">
      <option value="">Tutte le fonti</option>
      <option value="BitAgorà Orobica">BitAgorà Orobica</option>
      <option value="OpenAI">OpenAI</option>
      <option value="YouTube - Gabry Solutions">YouTube - Gabry Solutions</option>
      <option value="YouTube – DeepMind">YouTube – DeepMind</option>
      <option value="YouTube – OpenAI">YouTube – OpenAI</option>
      <option value="YouTube – Raffaele Gaito">YouTube – Raffaele Gaito</option>
      <option value="arXiv AI">arXiv AI</option>
    </select>
    <select id="days">
      <option value="">Qualsiasi data</option>
      <option value="7">Ultimi 7 giorni</option>
      <option value="15">Ultimi 15 giorni</option>
      <option value="30">Ultimi 30 giorni</option>
    </select>
    <button id="toggleDark">🌗 Modalità scura</button>
    <button id="resetFilters">🔄 Reset filtri</button>
  </div>

  <div id="entries" class="entries-grid"></div>

nformation Detection","description":"arXiv:2606.24112v1 Announce Type: new \nAbstract: Multimodal misinformation detection is increasingly important because viral posts now combine long multilingual narratives, several images, mixed provenance, and subtle text--image framing errors. Existing benchmarks and methods remain poorly matched ","category":"Paper","link":"https://arxiv.org/abs/2606.24112","source":"arXiv AI","badge":"📜"},{"date":"2026-06-24","title":"VeryTrace: Verifying Reasoning Traces through Compilable Formalism and Structured Verification","description":"arXiv:2606.24124v1 Announce Type: new \nAbstract: Multi-step reasoning with Chain-of-Thought (CoT) prompting remains fragile: logical errors or hallucinations in early steps silently propagate, producing confident but incorrect conclusions. This paper presents VeryTrace, a zero-shot verification-and-","category":"Paper","link":"https://arxiv.org/abs/2606.24124","source":"arXiv AI","badge":"📜"},{"date":"2026-06-23","title":"ChatGPT Futures, Class of 2026: The Next Generation of AI Leaders","description":"We asked the ChatGPT Futures Class of 2026 what they hope AI helps people do next.\n\nTheir answers came back to access, education, connection, and possibility: AI that helps close gaps instead of widening them, gives more people the tools to learn and build, and creates more room for the human parts ","category":"News","link":"https://www.youtube.com/shorts/mVpCDzoNtxA","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-23","title":"How Omio is building the future of conversational travel","description":"What happens when one of the world's leading travel platforms combines real-time transportation data with AI?\n\nIn this customer story, Omio shares how it's using ChatGPT, Codex, and the OpenAI API to reimagine how travelers discover and book journeys, while transforming how teams build and operate a","category":"News","link":"https://www.youtube.com/watch?v=qU5-komJ-GE","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-23","title":"When millions of AI agents meet","description":"The conversation of the moment is focused on one topic: AI agents. Unlike traditional language models that simply respond to a prompt, autonomous agents can execute multi-step plans and perform complex tasks on your behalf. But what happens when millions of these agents are not just working for us, ","category":"News","link":"https://www.youtube.com/watch?v=V04bm-3d6EQ","source":"YouTube – DeepMind","badge":"🔥"},{"date":"2026-06-23","title":"4 suggerimenti di Andrej Karphathy per potenziare Claude Code","description":"Compra il mio corso \"Crea un Agente AI con Claude Code\": https://www.raffaelegaito.com/claude-code-crea-agente-ai-corso-completo/?landing=true\n\nCompra il mio libro \"In cosa posso esserti utile?\", una guida molto pratica e poco emotiva all'IA https://amzn.to/4aMZrUX\n\nIn questo breve video vi mostro c","category":"News","link":"https://www.youtube.com/watch?v=HlMX2rhxL70","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-06-22","title":"Daybreak: Tools for securing every organization in the world","description":"OpenAI introduces new Daybreak tools, including Codex Security and GPT-5.5-Cyber, to help organizations find, validate, and patch vulnerabilities at scale.","category":"News","link":"https://openai.com/index/daybreak-securing-the-world","source":"OpenAI","badge":"🔥"},{"date":"2026-06-22","title":"Meet the ChatGPT Futures, Class of 2026","description":"The next generation is already building the future with AI.\n\nThe ChatGPT Futures Class of 2026 came together in San Francisco to share the ideas they're pursuing, the projects they're building, and the experiences that inspired them to start.\n\nAs the first graduating class to have ChatGPT throughout","category":"News","link":"https://www.youtube.com/shorts/GhCP2eDrKHk","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-22","title":"Intelligenza Artificiale: ci aiuta o no a pensare?","description":"L'Intelligenza Artificiale ci sta aiutando a creare o ci sta disabituando a pensare?\n\nL'efficienza è letteralmente alla portata di tutti: basta un prompt per ottenere una risposta in pochi secondi, ma c'è un prezzo da pagare se deleghiamo tutto alla macchina: perdiamo il processo.\n\nÈ proprio nel pro","category":"News","link":"https://www.youtube.com/shorts/fc2OcvY2h4U","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-06-21","title":"Samsung Electronics brings ChatGPT and Codex to employees","description":"Samsung Electronics deploys ChatGPT Enterprise and Codex to employees worldwide, marking one of OpenAI’s largest enterprise AI rollouts.","category":"News","link":"https://openai.com/index/samsung-electronics-chatgpt-codex-deployment","source":"OpenAI","badge":"🔥"},{"date":"2026-06-19","title":"La narrativa del \"non serve studiare\" è pericolosa [Ivan Ranza]","description":"#adv Verifica i requisiti per l’ammissione e blocca la tua borsa di studio da 1.000 Euro: https://instituteoftechnology.epicode.com/it/epicode-institute-of-technology-feat-gaito/?utm_source=Youtube&amp;utm_medium=Video_YT&amp;utm_campaign=Gaito_Epicode\n\nCompra il mio corso \"Crea un Agente AI con Cla","category":"News","link":"https://www.youtube.com/watch?v=SqTRbRLI8J8","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-06-18","title":"New usage analytics and updated spend controls for enterprises","description":"OpenAI introduces new spend controls and usage analytics for ChatGPT Enterprise, helping organizations manage costs and scale AI with confidence.","category":"News","link":"https://openai.com/index/chatgpt-enterprise-spend-controls","source":"OpenAI","badge":"🔥"},{"date":"2026-06-18","title":"Improving health intelligence in ChatGPT","description":"Learn how GPT-5.5 Instant improves ChatGPT’s health and wellness responses with stronger reasoning, better context, clearer communication, and physician-informed evaluations.","category":"News","link":"https://openai.com/index/improving-health-intelligence-in-chatgpt","source":"OpenAI","badge":"🔥"},{"date":"2026-06-18","title":"Improving health intelligence in ChatGPT","description":"Health is one of the most meaningful ways people use ChatGPT. \n\nEvery week, more than 230 million people turn to ChatGPT for help with health and wellness questions: making sense of health information, understanding lab results, preparing for appointments, navigating insurance, building healthier ha","category":"News","link":"https://www.youtube.com/watch?v=UxY8zJKRrHU","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-18","title":"Google ha appena ucciso l'AI a pagamento (Regalandola)","description":"Google ha appena ucciso l'AI a pagamento (Regalandola) e così Gemma 4 è gratis, ma non è generosità. Google ha appena ucciso l'AI a pagamento… regalandola. In questo video ti spiego la vera strategia dietro Gemma 4, il modello open weight gratuito di Google, e perché sta mettendo sotto pressione Ope","category":"News","link":"https://www.youtube.com/watch?v=oqGxNlhG5uM","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2025-07-30","title":"Newsletter BitAgora","description":"Selezione articoli IA","category":"Tool","link":"https://newsletter.bitagoraorobica.it/tag/ia/","source":"BitAgorà Orobica","badge":""}];

    const searchInput = document.getElementById('search');
    const categoryFilter = document.getElementById('category');
    const sourceFilter = document.getElementById('source');
    const daysFilter = document.getElementById('days');
    const toggleDark = document.getElementById('toggleDark');
    const resetFilters = document.getElementById('resetFilters');
    const entriesDiv = document.getElementById('entries');

    function createEntry(item) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.text = (item.title + ' ' + item.description).toLowerCase();
      div.dataset.category = item.category;
      div.dataset.source = item.source;
      div.dataset.date = item.date;
      div.innerHTML = `
        <a href="${item.link}" class="title" target="_blank">
          <span class="badge">${item.badge}</span>${item.title}
        </a>
        <p>${item.description}</p>
        <div class="meta">${item.source} – ${item.date} – ${item.category}</div>
      `;
      return div;
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const src = sourceFilter.value;
      const days = parseInt(daysFilter.value);
      const now = new Date();

      entriesDiv.innerHTML = "";
entryData.forEach(item => {
  const entryDate = new Date(item.date);
  const diffDays = (now - entryDate) / (1000 * 60 * 60 * 24);
  if (
    (!q || (item.title + item.description).toLowerCase().includes(q)) &&
    (!cat || item.category === cat) &&
    (!src || item.source === src) &&
    (isNaN(days) || diffDays <= days)
  ) {
    const el = createEntry(item);
    entriesDiv.appendChild(el);
    // trigger animazione
    requestAnimationFrame(() => el.classList.add("show"));
  }
});

      
      
    }

    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "";
      sourceFilter.value = "";
      daysFilter.value = "";
      render();
    });

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sourceFilter.addEventListener("change", render);
    daysFilter.addEventListener("change", render);
    toggleDark.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>
</body>
</html>
