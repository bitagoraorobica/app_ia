<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AI Compass – BitAgorà Orobica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef1f5;
      padding: 1em;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #181818;
      color: #e0e0e0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2em;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin: 0.5em 0;
    }
    header img {
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
      margin-bottom: 2em;
    }
    .controls input,
    .controls select,
    .controls button {
      font-size: 1em;
      padding: 0.5em;
      flex: 1 1 200px;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border 0.3s;
    }
    .controls input:hover,
    .controls select:hover {
      border-color: #007acc;
    }
    .entry {
      background: #ffffff;
      border-radius: 12px;
      padding: 1em;
      margin-bottom: 1.5em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }
    .entry[data-category="News"] {
      border-left-color: #007acc;
    }
    .entry[data-category="Paper"] {
      border-left-color: #e67e22;
    }
    .entry[data-category="Course"] {
      border-left-color: #27ae60;
    }
    .entry[data-category="Automation"] {
      border-left-color: #9b59b6; /* viola brillante */
    }
    body.dark .entry {
      background: #1e1e1e;
    }
    .entry .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #007acc;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5em;
    }
    body.dark .title {
      color: #4fc3f7;
    }
    .entry p {
      margin: 0.5em 0;
      line-height: 1.4;
    }
    .entry .meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 0.5em;
    }
    body.dark .meta {
      color: #aaa;
    }
    .entry .badge {
      margin-right: 0.5em;
      font-size: 1.2em;
    }
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls input,
      .controls select,
      .controls button {
        flex: 1 1 auto;
        max-width: 100%;
      }
    }
    
    .entries-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5em;
    }
    @media (min-width: 700px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (min-width: 1000px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}
.entry {
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s ease;
  opacity: 0;
}
.entry.show {
  opacity: 1;
}
.entry:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}
  
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Compass</h1>
    <img src="logo.png" alt="Logo">
  </header>
  <p><em>Selezione curata da <a href="https://www.bitagoraorobica.it" target="_blank">BitAgorà Orobica srl</a></em></p>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca per titolo o descrizione...">
    <select id="category">
      <option value="">Tutte le categorie</option>
      <option value="News">News</option>
      <option value="Paper">Paper</option>
      <option value="Course">Course</option>
      <option value="Automation">Automation</option>
    </select>
    <select id="source">
      <option value="">Tutte le fonti</option>
      <option value="BitAgorà Orobica">BitAgorà Orobica</option>
      <option value="OpenAI">OpenAI</option>
      <option value="YouTube - Gabry Solutions">YouTube - Gabry Solutions</option>
      <option value="YouTube – OpenAI">YouTube – OpenAI</option>
      <option value="YouTube – Raffaele Gaito">YouTube – Raffaele Gaito</option>
    </select>
    <select id="days">
      <option value="">Qualsiasi data</option>
      <option value="7">Ultimi 7 giorni</option>
      <option value="15">Ultimi 15 giorni</option>
      <option value="30">Ultimi 30 giorni</option>
    </select>
    <button id="toggleDark">🌗 Modalità scura</button>
    <button id="resetFilters">🔄 Reset filtri</button>
  </div>

  <div id="entries" class="entries-grid"></div>


  <script>
    const entryData = [{"date":"2026-03-13","title":"ChatGPT skills in beta for ChatGPT Business & Enterprise","description":"We’re introducing Skills in beta for ChatGPT Business and Enterprise.\n\nSkills are reusable, shareable workflows that tell ChatGPT exactly how to do a specific task, enabling ChatGPT to do that task better and more consistently. A skill can bundle instructions, examples, and even code. Once a skill h","category":"News","link":"https://www.youtube.com/watch?v=qh93rLRPw80","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-03-12","title":"OpenClaw: L'AI Gratis che Lavora per Te 24 Ore su 24","description":"Non Installare OpenClaw Prima di Aver Visto Questo perché, immagina di avere un dipendente AI che lavora per te 24 ore su 24, 7 giorni su 7. In questo video scopriamo OpenClaw (conosciuto in precedenza come ClawdBot), un assistente AI completamente open source e gratuito creato da Peter Steinberger.","category":"News","link":"https://www.youtube.com/watch?v=naKpBcDLZV0","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-03-11","title":"Designing AI agents to resist prompt injection","description":"How ChatGPT defends against prompt injection and social engineering by constraining risky actions and protecting sensitive data in agent workflows.","category":"News","link":"https://openai.com/index/designing-agents-to-resist-prompt-injection","source":"OpenAI","badge":"🔥"},{"date":"2026-03-11","title":"Rakuten fixes issues twice as fast with Codex","description":"Rakuten operates one of the world’s largest digital ecosystems across e-commerce, fintech, and mobile services. Shipping fast without sacrificing reliability is critical.\n\nTeams use OpenAI Codex to support incident response, code review, and development workflows. The agent works inside monitoring s","category":"News","link":"https://www.youtube.com/watch?v=gZQQR_tDGuM","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-03-11","title":"Ecco come Alessandro De Concini usa l'IA nel suo lavoro","description":"Usa il codice GAITO20 sul sito https://aiweek.it/ per avere il 20% di sconto sul biglietto! Ci vediamo a Maggio!\n\nOggi inauguro una nuova rubrica!\n\nChiederò ai vostri creator preferiti di raccontarmi il loro utilizzo dell'IA.\n\nCasi pratici, niente chiacchiere teoriche. Mi faranno degli esempi concre","category":"News","link":"https://www.youtube.com/watch?v=gWso-S8H6mo","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-03-10","title":"Build Hour: API & Codex","description":"Build agent-powered workflows for real engineering work with Codex and OpenAI APIs. In this Build Hour, you'll learn how teams are moving beyond pair programming to agentic delegation, where AI systems can take on entire engineering tasks from planning to execution. \n\nCharlie Guo (DevEx), Ryan Lopop","category":"News","link":"https://www.youtube.com/watch?v=rhsSqr0jdFw","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-03-10","title":"Nessuno ne parla, ma ChatGPT NON è nella Top 5 delle Migliori IA","description":"Nessuno ne parla, ma ChatGPT NON è nella Top 5 delle Migliori IA\n\n- 𝗦 𝗧𝗜𝗘𝗥\nClaude Opus 4.6\nFinestra da 1 milione di token: gli carichi un intero progetto.\nHa gli “agent teams”: più agenti lavorano insieme per te.\n\nGemini 3 Pro\nIl più forte in multimodalità: testo, immagini, video, tutto.\nSe usi Goog","category":"News","link":"https://www.youtube.com/shorts/35jYuzCEmM8","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2025-07-30","title":"Newsletter BitAgora","description":"Selezione articoli IA","category":"Tool","link":"https://newsletter.bitagoraorobica.it/tag/ia/","source":"BitAgorà Orobica","badge":""}];

    const searchInput = document.getElementById('search');
    const categoryFilter = document.getElementById('category');
    const sourceFilter = document.getElementById('source');
    const daysFilter = document.getElementById('days');
    const toggleDark = document.getElementById('toggleDark');
    const resetFilters = document.getElementById('resetFilters');
    const entriesDiv = document.getElementById('entries');

    function createEntry(item) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.text = (item.title + ' ' + item.description).toLowerCase();
      div.dataset.category = item.category;
      div.dataset.source = item.source;
      div.dataset.date = item.date;
      div.innerHTML = `
        <a href="${item.link}" class="title" target="_blank">
          <span class="badge">${item.badge}</span>${item.title}
        </a>
        <p>${item.description}</p>
        <div class="meta">${item.source} – ${item.date} – ${item.category}</div>
      `;
      return div;
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const src = sourceFilter.value;
      const days = parseInt(daysFilter.value);
      const now = new Date();

      entriesDiv.innerHTML = "";
entryData.forEach(item => {
  const entryDate = new Date(item.date);
  const diffDays = (now - entryDate) / (1000 * 60 * 60 * 24);
  if (
    (!q || (item.title + item.description).toLowerCase().includes(q)) &&
    (!cat || item.category === cat) &&
    (!src || item.source === src) &&
    (isNaN(days) || diffDays <= days)
  ) {
    const el = createEntry(item);
    entriesDiv.appendChild(el);
    // trigger animazione
    requestAnimationFrame(() => el.classList.add("show"));
  }
});

      
      
    }

    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "";
      sourceFilter.value = "";
      daysFilter.value = "";
      render();
    });

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sourceFilter.addEventListener("change", render);
    daysFilter.addEventListener("change", render);
    toggleDark.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>
</body>
</html>
