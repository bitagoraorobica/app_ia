<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AI Compass – BitAgorà Orobica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef1f5;
      padding: 1em;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #181818;
      color: #e0e0e0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2em;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin: 0.5em 0;
    }
    header img {
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
      margin-bottom: 2em;
    }
    .controls input,
    .controls select,
    .controls button {
      font-size: 1em;
      padding: 0.5em;
      flex: 1 1 200px;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border 0.3s;
    }
    .controls input:hover,
    .controls select:hover {
      border-color: #007acc;
    }
    .entry {
      background: #ffffff;
      border-radius: 12px;
      padding: 1em;
      margin-bottom: 1.5em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }
    .entry[data-category="News"] {
      border-left-color: #007acc;
    }
    .entry[data-category="Paper"] {
      border-left-color: #e67e22;
    }
    .entry[data-category="Course"] {
      border-left-color: #27ae60;
    }
    .entry[data-category="Automation"] {
      border-left-color: #9b59b6; /* viola brillante */
    }
    body.dark .entry {
      background: #1e1e1e;
    }
    .entry .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #007acc;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5em;
    }
    body.dark .title {
      color: #4fc3f7;
    }
    .entry p {
      margin: 0.5em 0;
      line-height: 1.4;
    }
    .entry .meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 0.5em;
    }
    body.dark .meta {
      color: #aaa;
    }
    .entry .badge {
      margin-right: 0.5em;
      font-size: 1.2em;
    }
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls input,
      .controls select,
      .controls button {
        flex: 1 1 auto;
        max-width: 100%;
      }
    }
    
    .entries-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5em;
    }
    @media (min-width: 700px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (min-width: 1000px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}
.entry {
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s ease;
  opacity: 0;
}
.entry.show {
  opacity: 1;
}
.entry:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}
  
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Compass</h1>
    <img src="logo.png" alt="Logo">
  </header>
  <p><em>Selezione curata da <a href="https://www.bitagoraorobica.it" target="_blank">BitAgorà Orobica srl</a></em></p>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca per titolo o descrizione...">
    <select id="category">
      <option value="">Tutte le categorie</option>
      <option value="News">News</option>
      <option value="Paper">Paper</option>
      <option value="Course">Course</option>
      <option value="Automation">Automation</option>
    </select>
    <select id="source">
      <option value="">Tutte le fonti</option>
      <option value="BitAgorà Orobica">BitAgorà Orobica</option>
      <option value="YouTube - Gabry Solutions">YouTube - Gabry Solutions</option>
      <option value="YouTube – OpenAI">YouTube – OpenAI</option>
      <option value="YouTube – Raffaele Gaito">YouTube – Raffaele Gaito</option>
      <option value="YouTube – Two Minute Papers">YouTube – Two Minute Papers</option>
      <option value="arXiv AI">arXiv AI</option>
    </select>
    <select id="days">
      <option value="">Qualsiasi data</option>
      <option value="7">Ultimi 7 giorni</option>
      <option value="15">Ultimi 15 giorni</option>
      <option value="30">Ultimi 30 giorni</option>
    </select>
    <button id="toggleDark">🌗 Modalità scura</button>
    <button id="resetFilters">🔄 Reset filtri</button>
  </div>

  <div id="entries" class="entries-grid"></div>

821","source":"arXiv AI","badge":"📜"},{"date":"2026-05-14","title":"TokaMind for Power Grid: Cross-Domain Transfer from Fusion Plasma","description":"arXiv:2605.11033v1 Announce Type: cross \nAbstract: TokaMind is a multi-modal transformer (MMT) foundation model pre-trained on tokamak plasma diagnostics data from MAST, where it was shown to outperform CNN-based approaches on fusion benchmarks. We investigate whether its learned representations gen","category":"Paper","link":"https://arxiv.org/abs/2605.11033","source":"arXiv AI","badge":"📜"},{"date":"2026-05-13","title":"Build Hour: GPT-Realtime-2","description":"Build with the next wave of realtime voice AI. In this Build Hour, you’ll learn how to use GPT-Realtime-2, GPT-Realtime-Translate, and GPT-Realtime-Whisper to build low-latency voice agents that can translate live speech, reason across tools, operate apps, and support more natural voice-to-voice and","category":"News","link":"https://www.youtube.com/watch?v=qGS9Ghnq1RU","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-13","title":"Suraj vs The Future | With ChatGPT","description":"Prepare smarter with ChatGPT\n\nCredits\nDirector: Abhinav Pratiman\nDOP: Tassaduq Hussain\nProduction House: Early Man Film\nCreative agency: Hue & Why","category":"News","link":"https://www.youtube.com/watch?v=bMmEEa8-6fU","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-13","title":"Come usare Claude Code Gratis [Tutorial semplice e onesto]","description":"Compra il mio corso Crea il tuo Agente AI con Claude Code: https://www.raffaelegaito.com/claude-code-crea-agente-ai-corso-completo/?landing=true\n\nCompra il mio libro \"In cosa posso esserti utile?\", una guida molto pratica e poco emotiva all'IA https://amzn.to/4aMZrUX\n\nIn questo tutorial vi mostro co","category":"News","link":"https://www.youtube.com/watch?v=V4_nD7h-N6A","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-05-12","title":"Nessuno Ne Parla, ma Esiste un Trucco per Farti dare Risposte Migliori dall’IA.","description":"Nessuno ne parla, ma esiste un trucco per farti dare risposte migliori dall’IA.\n\n1️⃣ Ecco il prompt:\n“Dammi tre prospettive diverse su\n[la tua domanda].\nPer ogni prospettiva, spiega quali prove la supportanoe quali la contraddicono.\nPoi dimmi quale prospettiva ha il supporto più solido e perché”\n\nCo","category":"News","link":"https://www.youtube.com/shorts/_J4SUTCl1F0","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-05-11","title":"L’IA Ti Sta Spiando: Cambia Queste 7 Impostazioni Nascoste ADESSO","description":"La bugia sulla privacy dell'IA è che disattivare un'opzione basti. Non basta. In questo video ti mostro le 7 impostazioni reali per proteggere i tuoi dati su ChatGPT, Claude e Gemini nel 2026 — quelle che né OpenAI, né Anthropic, né Google ti spiegano chiaramente.\n\nIl 22 aprile 2026 OpenAI ha rilasc","category":"News","link":"https://www.youtube.com/watch?v=iC--r7ALoY4","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-05-10","title":"Meta Ha Appena Ucciso Il Lavoro Da Dipendente","description":"Meta Ha Appena Ucciso Il Lavoro Da Dipendente\n\nMeta sta portando avanti il piano più subdolo \ne spaventoso del 2026. Senza che nessuno ne parli. \n\nSta usando i suoi dipendenti per addestrare il robot che li sostituirà. \n\n21 aprile 2026. \nReuters scopre un memo interno all’azienda. \nL'azienda sta ins","category":"News","link":"https://www.youtube.com/shorts/KBLzDDvsI4k","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-05-08","title":"OpenAI's ChatGPT 5.5 Instant: The Good, The Bad And The Insane","description":"❤️ Check out Lambda here and sign up for their GPU Cloud: https://lambda.ai/papers\n\n📝 GPT 5.5 Instant:\nhttps://deploymentsafety.openai.com/gpt-5-5-instant/introduction\nhttps://openai.com/index/gpt-5-5-instant/\n\nClassifiers paper: https://arxiv.org/pdf/2501.18837\n\nOur Patreon if you wish to support u","category":"News","link":"https://www.youtube.com/watch?v=4nQnhjimB4Y","source":"YouTube – Two Minute Papers","badge":"🔥"},{"date":"2026-05-08","title":"99% dei Marketer NON Sa Ancora Cosa Può Fare Claude Code nel 2026","description":"- Come Costruire un Team Marketing AI in 1 Giorno (Da Zero, Senza Codice) in questo video ti mostro come costruire un Team Marketing AI in 1 giorno, da zero e senza scrivere codice, usando Claude Code, Claude Skills e agenti AI specializzati.\n\nVedrai passo dopo passo come trasformare Claude in un ve","category":"News","link":"https://www.youtube.com/watch?v=MCLQhhDpGAs","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2025-07-30","title":"Newsletter BitAgora","description":"Selezione articoli IA","category":"Tool","link":"https://newsletter.bitagoraorobica.it/tag/ia/","source":"BitAgorà Orobica","badge":""}];

    const searchInput = document.getElementById('search');
    const categoryFilter = document.getElementById('category');
    const sourceFilter = document.getElementById('source');
    const daysFilter = document.getElementById('days');
    const toggleDark = document.getElementById('toggleDark');
    const resetFilters = document.getElementById('resetFilters');
    const entriesDiv = document.getElementById('entries');

    function createEntry(item) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.text = (item.title + ' ' + item.description).toLowerCase();
      div.dataset.category = item.category;
      div.dataset.source = item.source;
      div.dataset.date = item.date;
      div.innerHTML = `
        <a href="${item.link}" class="title" target="_blank">
          <span class="badge">${item.badge}</span>${item.title}
        </a>
        <p>${item.description}</p>
        <div class="meta">${item.source} – ${item.date} – ${item.category}</div>
      `;
      return div;
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const src = sourceFilter.value;
      const days = parseInt(daysFilter.value);
      const now = new Date();

      entriesDiv.innerHTML = "";
entryData.forEach(item => {
  const entryDate = new Date(item.date);
  const diffDays = (now - entryDate) / (1000 * 60 * 60 * 24);
  if (
    (!q || (item.title + item.description).toLowerCase().includes(q)) &&
    (!cat || item.category === cat) &&
    (!src || item.source === src) &&
    (isNaN(days) || diffDays <= days)
  ) {
    const el = createEntry(item);
    entriesDiv.appendChild(el);
    // trigger animazione
    requestAnimationFrame(() => el.classList.add("show"));
  }
});

      
      
    }

    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "";
      sourceFilter.value = "";
      daysFilter.value = "";
      render();
    });

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sourceFilter.addEventListener("change", render);
    daysFilter.addEventListener("change", render);
    toggleDark.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>
</body>
</html>
