<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AI Compass – BitAgorà Orobica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef1f5;
      padding: 1em;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #181818;
      color: #e0e0e0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2em;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin: 0.5em 0;
    }
    header img {
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
      margin-bottom: 2em;
    }
    .controls input,
    .controls select,
    .controls button {
      font-size: 1em;
      padding: 0.5em;
      flex: 1 1 200px;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border 0.3s;
    }
    .controls input:hover,
    .controls select:hover {
      border-color: #007acc;
    }
    .entry {
      background: #ffffff;
      border-radius: 12px;
      padding: 1em;
      margin-bottom: 1.5em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }
    .entry[data-category="News"] {
      border-left-color: #007acc;
    }
    .entry[data-category="Paper"] {
      border-left-color: #e67e22;
    }
    .entry[data-category="Course"] {
      border-left-color: #27ae60;
    }
    .entry[data-category="Automation"] {
      border-left-color: #9b59b6; /* viola brillante */
    }
    body.dark .entry {
      background: #1e1e1e;
    }
    .entry .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #007acc;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5em;
    }
    body.dark .title {
      color: #4fc3f7;
    }
    .entry p {
      margin: 0.5em 0;
      line-height: 1.4;
    }
    .entry .meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 0.5em;
    }
    body.dark .meta {
      color: #aaa;
    }
    .entry .badge {
      margin-right: 0.5em;
      font-size: 1.2em;
    }
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls input,
      .controls select,
      .controls button {
        flex: 1 1 auto;
        max-width: 100%;
      }
    }
    
    .entries-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5em;
    }
    @media (min-width: 700px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (min-width: 1000px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}
.entry {
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s ease;
  opacity: 0;
}
.entry.show {
  opacity: 1;
}
.entry:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}
  
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Compass</h1>
    <img src="logo.png" alt="Logo">
  </header>
  <p><em>Selezione curata da <a href="https://www.bitagoraorobica.it" target="_blank">BitAgorà Orobica srl</a></em></p>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca per titolo o descrizione...">
    <select id="category">
      <option value="">Tutte le categorie</option>
      <option value="News">News</option>
      <option value="Paper">Paper</option>
      <option value="Course">Course</option>
      <option value="Automation">Automation</option>
    </select>
    <select id="source">
      <option value="">Tutte le fonti</option>
      <option value="BitAgorà Orobica">BitAgorà Orobica</option>
      <option value="Microsoft Research">Microsoft Research</option>
      <option value="OpenAI">OpenAI</option>
      <option value="YouTube - Gabry Solutions">YouTube - Gabry Solutions</option>
      <option value="YouTube – OpenAI">YouTube – OpenAI</option>
      <option value="YouTube – Raffaele Gaito">YouTube – Raffaele Gaito</option>
      <option value="arXiv AI">arXiv AI</option>
    </select>
    <select id="days">
      <option value="">Qualsiasi data</option>
      <option value="7">Ultimi 7 giorni</option>
      <option value="15">Ultimi 15 giorni</option>
      <option value="30">Ultimi 30 giorni</option>
    </select>
    <button id="toggleDark">🌗 Modalità scura</button>
    <button id="resetFilters">🔄 Reset filtri</button>
  </div>

  <div id="entries" class="entries-grid"></div>

bs/2603.27164","source":"arXiv AI","badge":"📜"},{"date":"2026-03-31","title":"A Comparative Study in Surgical AI: Datasets, Foundation Models, and Barriers to Med-AGI","description":"arXiv:2603.27341v1 Announce Type: new \nAbstract: Recent Artificial Intelligence (AI) models have matched or exceeded human experts in several benchmarks of biomedical task performance, but have lagged behind on surgical image-analysis benchmarks. Since surgery requires integrating disparate tasks --","category":"Paper","link":"https://arxiv.org/abs/2603.27341","source":"arXiv AI","badge":"📜"},{"date":"2026-03-30","title":"Ecco come uso ChatGPT quando sto in vacanza [cambia tutto]","description":"Ottieni il 15% di sconto su Saily, vai al link https://saily.com/gaito e usa il coupon GAITO\n\nIn questo video ti mostro 5 modi concreti per usare ChatGPT in vacanza, cose che faccio io davvero ogni volta che sono in giro, sia per piacere che per lavoro.\n\nNon si tratta del solito \"dimmi cosa fare a B","category":"News","link":"https://www.youtube.com/watch?v=lfGaZZN_VfA","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-03-30","title":"Dammi 25 Minuti e ti renderò PERICOLOSAMENTE produttivo con Claude","description":"Dammi 25 Minuti e ti renderò PERICOLOSAMENTE produttivo con Claude in quanto Claude è lo strumento AI più intelligente disponibile nel 2026. \n\nIn questo tutorial completo ti mostro TUTTO quello che devi sapere per usarlo al massimo: dai modelli Opus 4.6 e Sonnet 4.6 agli Artifacts interattivi, dalla","category":"News","link":"https://www.youtube.com/watch?v=oRiTHMNA7Tg","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-03-27","title":"Find the perfect gift by shopping with ChatGPT","description":"ChatGPT can help you find the perfect gift based on your budget, preferences, and constraints—and surface products that fit. \n\nYou can browse visually, upload images as inspiration for similar items, and refine results conversationally until you land on t ks in AI systems.","category":"News","link":"https://openai.com/index/teen-safety-policies-gpt-oss-safeguard","source":"OpenAI","badge":"🔥"},{"date":"2026-03-24","title":"Powering product discovery in ChatGPT","description":"ChatGPT introduces richer, visually immersive shopping powered by the Agentic Commerce Protocol, enabling product discovery, side-by-side comparisons, and merchant integration.","category":"News","link":"https://openai.com/index/powering-product-discovery-in-chatgpt","source":"OpenAI","badge":"🔥"},{"date":"2026-03-24","title":"An updated shopping experience in ChatGPT","description":"Shopping in ChatGPT just got an upgrade. Now, you can browse products visually, compare options side-by-side, and get detailed, up-to-date information—all in one place. This builds on what ChatGPT does best: helping you figure out what to buy.\n\n\nUnder the hood, we’re improving speed, relevance, and ","category":"News","link":"https://www.youtube.com/watch?v=qF4QRh2u7FE","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-03-23","title":"Google Ha Appena Spiegato Come Usare l'AI (e Nessuno Ne Parla)","description":"Il 99% delle Persone Usa l'AI nel Modo SBAGLIATO (Dice Google) \n\nGoogle ha rilasciato un corso di 6 ore sul Prompt Engineering, ma ho scoperto che quasi tutti continuano a commettere gli stessi identici errori. In questo video ti riassumo i segreti di Google in soli 10 minuti per farti usare l'Intel","category":"News","link":"https://www.youtube.com/watch?v=P7yqe2MYG3g","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2025-07-30","title":"Newsletter BitAgora","description":"Selezione articoli IA","category":"Tool","link":"https://newsletter.bitagoraorobica.it/tag/ia/","source":"BitAgorà Orobica","badge":""}];

    const searchInput = document.getElementById('search');
    const categoryFilter = document.getElementById('category');
    const sourceFilter = document.getElementById('source');
    const daysFilter = document.getElementById('days');
    const toggleDark = document.getElementById('toggleDark');
    const resetFilters = document.getElementById('resetFilters');
    const entriesDiv = document.getElementById('entries');

    function createEntry(item) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.text = (item.title + ' ' + item.description).toLowerCase();
      div.dataset.category = item.category;
      div.dataset.source = item.source;
      div.dataset.date = item.date;
      div.innerHTML = `
        <a href="${item.link}" class="title" target="_blank">
          <span class="badge">${item.badge}</span>${item.title}
        </a>
        <p>${item.description}</p>
        <div class="meta">${item.source} – ${item.date} – ${item.category}</div>
      `;
      return div;
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const src = sourceFilter.value;
      const days = parseInt(daysFilter.value);
      const now = new Date();

      entriesDiv.innerHTML = "";
entryData.forEach(item => {
  const entryDate = new Date(item.date);
  const diffDays = (now - entryDate) / (1000 * 60 * 60 * 24);
  if (
    (!q || (item.title + item.description).toLowerCase().includes(q)) &&
    (!cat || item.category === cat) &&
    (!src || item.source === src) &&
    (isNaN(days) || diffDays <= days)
  ) {
    const el = createEntry(item);
    entriesDiv.appendChild(el);
    // trigger animazione
    requestAnimationFrame(() => el.classList.add("show"));
  }
});

      
      
    }

    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "";
      sourceFilter.value = "";
      daysFilter.value = "";
      render();
    });

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sourceFilter.addEventListener("change", render);
    daysFilter.addEventListener("change", render);
    toggleDark.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>
</body>
</html>
