<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AI Compass – BitAgorà Orobica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef1f5;
      padding: 1em;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #181818;
      color: #e0e0e0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2em;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin: 0.5em 0;
    }
    header img {
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
      margin-bottom: 2em;
    }
    .controls input,
    .controls select,
    .controls button {
      font-size: 1em;
      padding: 0.5em;
      flex: 1 1 200px;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border 0.3s;
    }
    .controls input:hover,
    .controls select:hover {
      border-color: #007acc;
    }
    .entry {
      background: #ffffff;
      border-radius: 12px;
      padding: 1em;
      margin-bottom: 1.5em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }
    .entry[data-category="News"] {
      border-left-color: #007acc;
    }
    .entry[data-category="Paper"] {
      border-left-color: #e67e22;
    }
    .entry[data-category="Course"] {
      border-left-color: #27ae60;
    }
    .entry[data-category="Automation"] {
      border-left-color: #9b59b6; /* viola brillante */
    }
    body.dark .entry {
      background: #1e1e1e;
    }
    .entry .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #007acc;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5em;
    }
    body.dark .title {
      color: #4fc3f7;
    }
    .entry p {
      margin: 0.5em 0;
      line-height: 1.4;
    }
    .entry .meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 0.5em;
    }
    body.dark .meta {
      color: #aaa;
    }
    .entry .badge {
      margin-right: 0.5em;
      font-size: 1.2em;
    }
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls input,
      .controls select,
      .controls button {
        flex: 1 1 auto;
        max-width: 100%;
      }
    }
    
    .entries-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5em;
    }
    @media (min-width: 700px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (min-width: 1000px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}
.entry {
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s ease;
  opacity: 0;
}
.entry.show {
  opacity: 1;
}
.entry:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}
  
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Compass</h1>
    <img src="logo.png" alt="Logo">
  </header>
  <p><em>Selezione curata da <a href="https://www.bitagoraorobica.it" target="_blank">BitAgorà Orobica srl</a></em></p>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca per titolo o descrizione...">
    <select id="category">
      <option value="">Tutte le categorie</option>
      <option value="News">News</option>
      <option value="Paper">Paper</option>
      <option value="Course">Course</option>
      <option value="Automation">Automation</option>
    </select>
    <select id="source">
      <option value="">Tutte le fonti</option>
      <option value="BitAgorà Orobica">BitAgorà Orobica</option>
      <option value="YouTube - Gabry Solutions">YouTube - Gabry Solutions</option>
      <option value="YouTube – OpenAI">YouTube – OpenAI</option>
      <option value="arXiv AI">arXiv AI</option>
    </select>
    <select id="days">
      <option value="">Qualsiasi data</option>
      <option value="7">Ultimi 7 giorni</option>
      <option value="15">Ultimi 15 giorni</option>
      <option value="30">Ultimi 30 giorni</option>
    </select>
    <button id="toggleDark">🌗 Modalità scura</button>
    <button id="resetFilters">🔄 Reset filtri</button>
  </div>

  <div id="entries" class="entries-grid"></div>


  <script>
    const entryData = [{"date":"2026-06-17","title":"When Rules Learn: A Self-Evolving Agent for Legal Case Retrieval","description":"arXiv:2606.17220v1 Announce Type: new \nAbstract: Legal case retrieval remains challenging due to the complexity of legal language and the need for precise lexical alignment between queries and relevant cases. Although dense retrieval models have achieved notable progress, empirical studies show that","category":"Paper","link":"https://arxiv.org/abs/2606.17220","source":"arXiv AI","badge":"📜"},{"date":"2026-06-17","title":"Quantifying Consistency in LLM Logical Reasoning via Structural Uncertainty","description":"arXiv:2606.17312v1 Announce Type: new \nAbstract: Large language models can arrive at the same answer through reasoning paths that are unstable, contradictory, or difficult to rank consistently -- a failure mode especially prevalent in multi-step deductive reasoning. Existing methods assess reliabili","category":"Paper","link":"https://arxiv.org/abs/2606.17312","source":"arXiv AI","badge":"📜"},{"date":"2026-06-17","title":"MemTrace: Probing What Final Accuracy Misses in Long-Term Memory","description":"arXiv:2606.17328v1 Announce Type: new \nAbstract: LLM agents increasingly maintain long-term memory of user facts across sessions. Yet such memory is usually evaluated by aggregating accuracy over question rows or episodes. Because this approach scores question rows independently, even when several q","category":"Paper","link":"https://arxiv.org/abs/2606.17328","source":"arXiv AI","badge":"📜"},{"date":"2026-06-17","title":"Incumbent Advantage: Brand Bias and Cognitive Manipulation Dynamics in LLM Recommendation Systems","description":"arXiv:2606.17443v1 Announce Type: new \nAbstract: Large language models (LLMs) are becoming a major way for consumers to find products, but we do not yet understand how brands compete in this new channel. We study brand dynamics in LLM recommendations using skincare products -- a category where consu","category":"Paper","link":"https://arxiv.org/abs/2606.17443","source":"arXiv AI","badge":"📜"},{"date":"2026-06-17","title":"Dissecting model behavior through agent trajectories","description":"arXiv:2606.17454v1 Announce Type: new \nAbstract: AI agent performance is not just a modeling problem, it is fundamentally a systems problem. The advanced capabilities of models are realized through agent harnesses. Therefore, a gap between model assumptions and harness behavior can easily prevent th","category":"Paper","link":"https://arxiv.org/abs/2606.17454","source":"arXiv AI","badge":"📜"},{"date":"2026-06-16","title":"Why Tejal Patwardhan stopped underestimating the models - Episode 21","description":"The old tests are getting too easy. Tejal Patwardhan leads OpenAI’s frontier evals team, which is finding new ways to measure and forecast progress as models become more capable. She and host Andrew Mayne discuss why evals matter for research, how benchmarks can break or get gamed, and what models n","category":"News","link":"https://www.youtube.com/watch?v=CFqjjKp9Y-Q","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-15","title":"How Wayfair Uses GPT-5.5 to Power Catalog Enrichment Across 40M Products","description":"Fiona Tan and her @wayfair team are leveraging GPT-5.5 and our API to power their catalog enrichment program across 40M products — helping improve how product information is organized, differentiated, and understood.\n\nNext up? Pointing Codex at their gnarliest problems.\nhttps://openai.com/index/wayf","category":"News","link":"https://www.youtube.com/watch?v=TDM2Dz_MuPk","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-15","title":"Codex as a Solutions Engineering Partner","description":"“A big part of my role as a solutions engineer is not only to build but to understand,” Stephanie Anani, Solutions Engineer, OpenAI. \n\nStephanie points Codex to Trustpilot reviews and will mock up a customer website based on the feedback to show them how easy it is to make changes. \n\nCodex can be a ","category":"News","link":"https://www.youtube.com/watch?v=_jNbM8pV9oI","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-06-15","title":"Dammi 19 Minuti e Avrai l'IA di Google GRATIS sul tuo PC","description":"Dammi 20 Minuti e Avrai l'IA di Google GRATIS sul tuo PC , in quanto Gemma 4 è il modello AI open-weight più potente di Google, e puoi farlo girare GRATIS sul tuo PC o smartphone, 100% offline e con privacy totale. In questo video ti mostro come installarlo in pochi minuti.In meno di 20 minuti impar","category":"News","link":"https://www.youtube.com/watch?v=Gz46eOuIkYk","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-06-11","title":"Customer Ignite Talk: Antonio Bravo Acin (Global Head of AI Transformation, BBVA) & OpenAI","description":"BBVA is bringing AI into the core of its business.\n\nIn this conversation, Antonio Bravo, Chief Data and AI Officer at BBVA, shares how the bank rolled out ChatGPT Enterprise to 120,000+ employees and built an AI strategy around six business-focused robots.\n\nHear how BBVA is using OpenAI and Codex to","category":"News","link":"https://www.youtube.com/watch?v=UNJSk90Lz1c","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2025-07-30","title":"Newsletter BitAgora","description":"Selezione articoli IA","category":"Tool","link":"https://newsletter.bitagoraorobica.it/tag/ia/","source":"BitAgorà Orobica","badge":""}];

    const searchInput = document.getElementById('search');
    const categoryFilter = document.getElementById('category');
    const sourceFilter = document.getElementById('source');
    const daysFilter = document.getElementById('days');
    const toggleDark = document.getElementById('toggleDark');
    const resetFilters = document.getElementById('resetFilters');
    const entriesDiv = document.getElementById('entries');

    function createEntry(item) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.text = (item.title + ' ' + item.description).toLowerCase();
      div.dataset.category = item.category;
      div.dataset.source = item.source;
      div.dataset.date = item.date;
      div.innerHTML = `
        <a href="${item.link}" class="title" target="_blank">
          <span class="badge">${item.badge}</span>${item.title}
        </a>
        <p>${item.description}</p>
        <div class="meta">${item.source} – ${item.date} – ${item.category}</div>
      `;
      return div;
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const src = sourceFilter.value;
      const days = parseInt(daysFilter.value);
      const now = new Date();

      entriesDiv.innerHTML = "";
entryData.forEach(item => {
  const entryDate = new Date(item.date);
  const diffDays = (now - entryDate) / (1000 * 60 * 60 * 24);
  if (
    (!q || (item.title + item.description).toLowerCase().includes(q)) &&
    (!cat || item.category === cat) &&
    (!src || item.source === src) &&
    (isNaN(days) || diffDays <= days)
  ) {
    const el = createEntry(item);
    entriesDiv.appendChild(el);
    // trigger animazione
    requestAnimationFrame(() => el.classList.add("show"));
  }
});

      
      
    }

    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "";
      sourceFilter.value = "";
      daysFilter.value = "";
      render();
    });

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sourceFilter.addEventListener("change", render);
    daysFilter.addEventListener("change", render);
    toggleDark.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>
</body>
</html>
