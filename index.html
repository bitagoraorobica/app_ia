<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AI Compass – BitAgorà Orobica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef1f5;
      padding: 1em;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #181818;
      color: #e0e0e0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2em;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin: 0.5em 0;
    }
    header img {
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
      margin-bottom: 2em;
    }
    .controls input,
    .controls select,
    .controls button {
      font-size: 1em;
      padding: 0.5em;
      flex: 1 1 200px;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border 0.3s;
    }
    .controls input:hover,
    .controls select:hover {
      border-color: #007acc;
    }
    .entry {
      background: #ffffff;
      border-radius: 12px;
      padding: 1em;
      margin-bottom: 1.5em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }
    .entry[data-category="News"] {
      border-left-color: #007acc;
    }
    .entry[data-category="Paper"] {
      border-left-color: #e67e22;
    }
    .entry[data-category="Course"] {
      border-left-color: #27ae60;
    }
    .entry[data-category="Automation"] {
      border-left-color: #9b59b6; /* viola brillante */
    }
    body.dark .entry {
      background: #1e1e1e;
    }
    .entry .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #007acc;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5em;
    }
    body.dark .title {
      color: #4fc3f7;
    }
    .entry p {
      margin: 0.5em 0;
      line-height: 1.4;
    }
    .entry .meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 0.5em;
    }
    body.dark .meta {
      color: #aaa;
    }
    .entry .badge {
      margin-right: 0.5em;
      font-size: 1.2em;
    }
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls input,
      .controls select,
      .controls button {
        flex: 1 1 auto;
        max-width: 100%;
      }
    }
    
    .entries-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5em;
    }
    @media (min-width: 700px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (min-width: 1000px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}
.entry {
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s ease;
  opacity: 0;
}
.entry.show {
  opacity: 1;
}
.entry:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}
  
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Compass</h1>
    <img src="logo.png" alt="Logo">
  </header>
  <p><em>Selezione curata da <a href="https://www.bitagoraorobica.it" target="_blank">BitAgorà Orobica srl</a></em></p>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca per titolo o descrizione...">
    <select id="category">
      <option value="">Tutte le categorie</option>
      <option value="News">News</option>
      <option value="Paper">Paper</option>
      <option value="Course">Course</option>
      <option value="Automation">Automation</option>
    </select>
    <select id="source">
      <option value="">Tutte le fonti</option>
      <option value="BitAgorà Orobica">BitAgorà Orobica</option>
      <option value="YouTube - Gabry Solutions">YouTube - Gabry Solutions</option>
      <option value="YouTube – OpenAI">YouTube – OpenAI</option>
      <option value="YouTube – Raffaele Gaito">YouTube – Raffaele Gaito</option>
      <option value="arXiv AI">arXiv AI</option>
    </select>
    <select id="days">
      <option value="">Qualsiasi data</option>
      <option value="7">Ultimi 7 giorni</option>
      <option value="15">Ultimi 15 giorni</option>
      <option value="30">Ultimi 30 giorni</option>
    </select>
    <button id="toggleDark">🌗 Modalità scura</button>
    <button id="resetFilters">🔄 Reset filtri</button>
  </div>

  <div id="entries" class="entries-grid"></div>


  <script>
    const entryData = [{"date":"2026-03-23","title":"Learning to Disprove: Formal Counterexample Generation with Large Language Models","description":"arXiv:2603.19514v1 Announce Type: new \nAbstract: Mathematical reasoning demands two critical, complementary skills: constructing rigorous proofs for true statements and discovering counterexamples that disprove false ones. However, current AI efforts in mathematics focus almost exclusively on proof ","category":"Paper","link":"https://arxiv.org/abs/2603.19514","source":"arXiv AI","badge":"📜"},{"date":"2026-03-23","title":"ItinBench: Benchmarking Planning Across Multiple Cognitive Dimensions with Large Language Models","description":"arXiv:2603.19515v1 Announce Type: new \nAbstract: Large language models (LLMs) with advanced cognitive capabilities are emerging as agents for various reasoning and planning tasks. Traditional evaluations often focus on specific reasoning or planning questions within controlled environments. Recent s","category":"Paper","link":"https://arxiv.org/abs/2603.19515","source":"arXiv AI","badge":"📜"},{"date":"2026-03-23","title":"HyEvo: Self-Evolving Hybrid Agentic Workflows for Efficient Reasoning","description":"arXiv:2603.19639v1 Announce Type: new \nAbstract: Although agentic workflows have demonstrated strong potential for solving complex tasks, existing automated generation methods remain inefficient and underperform, as they rely on predefined operator libraries and homogeneous LLM-only workflows in whi","category":"Paper","link":"https://arxiv.org/abs/2603.19639","source":"arXiv AI","badge":"📜"},{"date":"2026-03-23","title":"A Subgoal-driven Framework for Improving Long-Horizon LLM Agents","description":"arXiv:2603.19685v1 Announce Type: new \nAbstract: Large language model (LLM)-based agents have emerged as powerful autonomous controllers for digital environments, including mobile interfaces, operating systems, and web browsers. Web navigation, for example, requires handling dynamic content and long","category":"Paper","link":"https://arxiv.org/abs/2603.19685","source":"arXiv AI","badge":"📜"},{"date":"2026-03-23","title":"Stepwise: Neuro-Symbolic Proof Search for Automated Systems Verification","description":"arXiv:2603.19715v1 Announce Type: new \nAbstract: Formal verification via interactive theorem proving is increasingly used to ensure the correctness of critical systems, yet constructing large proof scripts remains highly manual and limits scalability. Advances in large language models (LLMs), especi","category":"Paper","link":"https://arxiv.org/abs/2603.19715","source":"arXiv AI","badge":"📜"},{"date":"2026-03-23","title":"Ecco come uso l'IA per risolvere problemi (copia il mio prompt)","description":"Compra il mio libro \"In cosa posso esserti utile?\", una guida molto pratica e poco emotiva all'IA https://amzn.to/4aMZrUX\n\nQuasi tutti usano l'IA nello stesso modo sbagliato: aprono, scrivono una riga, e si aspettano la risposta.\n\nIl problema è che così stai usando uno degli strumenti più potenti ch","category":"News","link":"https://www.youtube.com/watch?v=shfb8OwSGl8","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-03-20","title":"From your kitchen to customers | with ChatGPT","description":"Millions of people use ChatGPT daily to build the things that matter to them. For many home based business women, the gap between a hobby and a business can feel overwhelming.\n\nBy helping with business planning, marketing strategies, and creative solutioning - ChatGPT supports the small, daily steps","category":"News","link":"https://www.youtube.com/watch?v=ApOVfOGWTJU","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-03-20","title":"Building a small business with ChatGPT","description":"Identifying a gap in the market was the first step - building a business to fill it was the challenge. To navigate the complexities of manufacturing and distribution, ChatGPT helps break down the roadmap of a new venture. From sourcing materials to planning for scale, it supports the daily decisions","category":"News","link":"https://www.youtube.com/watch?v=p2GKhlPMVO0","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-03-20","title":"Nel 2026 i Prompt Non Si Scrivono. Si Rubano","description":"Nel 2026 i Prompt Non Si Scrivono. Si Rubano\nEsiste un sito dove tu gli dici cosa vuoi ottenere, \nlui ti dà il prompt perfetto.\n\nÈ come avere un esperto di AI che lavora gratis per te. \nIl sito si chiama FlowGPT.com \n\nE non è il solito elenco di prompt copiati \n- è una community di 1 milione di pers","category":"News","link":"https://www.youtube.com/shorts/4FossfnQbdc","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-03-19","title":"5 cose che non sapevi di poter fare con l'AI (esempi reali)","description":"Ottieni lo sconto + 4 mesi in regalo su NordVPN: https://nordvpn.com/gaito\n\nIn questo video ti mostro altri 5 modi concreti con cui uso l'intelligenza artificiale nel mio lavoro quotidiano — tutti esempi reali, con i prompt veri che uso io.\n\nQuante cose concrete fai con l'AI ogni giorno nel tuo lavo","category":"News","link":"https://www.youtube.com/watch?v=zkHAAqMXsxY","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-03-19","title":"Ho testato l'Al per 6 mesi. Ti servono solo queste 5 cose...","description":"L’UNICA Guida AI che ti serve nel 2026 perché ogni settimana esce un nuovo tool AI e ti dicono che se non lo usi sei già indietro. Il risultato? Salti da un'app all'altra senza padroneggiarne nessuna.\n\nLa verità è che l'AI non è più solo un chatbot: è un ecosistema enorme. In questo video scoprirai ","category":"News","link":"https://www.youtube.com/watch?v=2gcq1QlKfm4","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2025-07-30","title":"Newsletter BitAgora","description":"Selezione articoli IA","category":"Tool","link":"https://newsletter.bitagoraorobica.it/tag/ia/","source":"BitAgorà Orobica","badge":""}];

    const searchInput = document.getElementById('search');
    const categoryFilter = document.getElementById('category');
    const sourceFilter = document.getElementById('source');
    const daysFilter = document.getElementById('days');
    const toggleDark = document.getElementById('toggleDark');
    const resetFilters = document.getElementById('resetFilters');
    const entriesDiv = document.getElementById('entries');

    function createEntry(item) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.text = (item.title + ' ' + item.description).toLowerCase();
      div.dataset.category = item.category;
      div.dataset.source = item.source;
      div.dataset.date = item.date;
      div.innerHTML = `
        <a href="${item.link}" class="title" target="_blank">
          <span class="badge">${item.badge}</span>${item.title}
        </a>
        <p>${item.description}</p>
        <div class="meta">${item.source} – ${item.date} – ${item.category}</div>
      `;
      return div;
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const src = sourceFilter.value;
      const days = parseInt(daysFilter.value);
      const now = new Date();

      entriesDiv.innerHTML = "";
entryData.forEach(item => {
  const entryDate = new Date(item.date);
  const diffDays = (now - entryDate) / (1000 * 60 * 60 * 24);
  if (
    (!q || (item.title + item.description).toLowerCase().includes(q)) &&
    (!cat || item.category === cat) &&
    (!src || item.source === src) &&
    (isNaN(days) || diffDays <= days)
  ) {
    const el = createEntry(item);
    entriesDiv.appendChild(el);
    // trigger animazione
    requestAnimationFrame(() => el.classList.add("show"));
  }
});

      
      
    }

    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "";
      sourceFilter.value = "";
      daysFilter.value = "";
      render();
    });

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sourceFilter.addEventListener("change", render);
    daysFilter.addEventListener("change", render);
    toggleDark.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>
</body>
</html>
