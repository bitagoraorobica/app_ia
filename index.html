<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AI Compass – BitAgorà Orobica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef1f5;
      padding: 1em;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #181818;
      color: #e0e0e0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2em;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin: 0.5em 0;
    }
    header img {
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
      margin-bottom: 2em;
    }
    .controls input,
    .controls select,
    .controls button {
      font-size: 1em;
      padding: 0.5em;
      flex: 1 1 200px;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border 0.3s;
    }
    .controls input:hover,
    .controls select:hover {
      border-color: #007acc;
    }
    .entry {
      background: #ffffff;
      border-radius: 12px;
      padding: 1em;
      margin-bottom: 1.5em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }
    .entry[data-category="News"] {
      border-left-color: #007acc;
    }
    .entry[data-category="Paper"] {
      border-left-color: #e67e22;
    }
    .entry[data-category="Course"] {
      border-left-color: #27ae60;
    }
    .entry[data-category="Automation"] {
      border-left-color: #9b59b6; /* viola brillante */
    }
    body.dark .entry {
      background: #1e1e1e;
    }
    .entry .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #007acc;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5em;
    }
    body.dark .title {
      color: #4fc3f7;
    }
    .entry p {
      margin: 0.5em 0;
      line-height: 1.4;
    }
    .entry .meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 0.5em;
    }
    body.dark .meta {
      color: #aaa;
    }
    .entry .badge {
      margin-right: 0.5em;
      font-size: 1.2em;
    }
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls input,
      .controls select,
      .controls button {
        flex: 1 1 auto;
        max-width: 100%;
      }
    }
    
    .entries-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5em;
    }
    @media (min-width: 700px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (min-width: 1000px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}
.entry {
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s ease;
  opacity: 0;
}
.entry.show {
  opacity: 1;
}
.entry:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}
  
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Compass</h1>
    <img src="logo.png" alt="Logo">
  </header>
  <p><em>Selezione curata da <a href="https://www.bitagoraorobica.it" target="_blank">BitAgorà Orobica srl</a></em></p>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca per titolo o descrizione...">
    <select id="category">
      <option value="">Tutte le categorie</option>
      <option value="News">News</option>
      <option value="Paper">Paper</option>
      <option value="Course">Course</option>
      <option value="Automation">Automation</option>
    </select>
    <select id="source">
      <option value="">Tutte le fonti</option>
      <option value="BitAgorà Orobica">BitAgorà Orobica</option>
      <option value="Microsoft Research">Microsoft Research</option>
      <option value="OpenAI">OpenAI</option>
      <option value="VentureBeat AI">VentureBeat AI</option>
      <option value="YouTube - Gabry Solutions">YouTube - Gabry Solutions</option>
      <option value="YouTube – OpenAI">YouTube – OpenAI</option>
      <option value="arXiv AI">arXiv AI</option>
    </select>
    <select id="days">
      <option value="">Qualsiasi data</option>
      <option value="7">Ultimi 7 giorni</option>
      <option value="15">Ultimi 15 giorni</option>
      <option value="30">Ultimi 30 giorni</option>
    </select>
    <button id="toggleDark">🌗 Modalità scura</button>
    <button id="resetFilters">🔄 Reset filtri</button>
  </div>

  <div id="entries" class="entries-grid"></div>


  <script>
    const entryData = [{"date":"2026-05-20","title":"Position: Let's Develop Data Probes to Fundamentally Understand How Data Affects LLM Performance","description":"arXiv:2605.18801v1 Announce Type: new \nAbstract: Data is fundamental to large language models (LLMs). However, understanding of what makes certain data useful for different stages of an LLM workflow, including training, tuning, alignment, in-context learning, etc., and why, remains an open question.","category":"Paper","link":"https://arxiv.org/abs/2605.18801","source":"arXiv AI","badge":"📜"},{"date":"2026-05-20","title":"Operationalizing Document AI: A Microservice Architecture for OCR and LLM Pipelines in Production","description":"arXiv:2605.18818v1 Announce Type: new \nAbstract: Academic research tends to focus on new models for document understanding creating a wide gap in the literature between model definition and running models at production scale. To close that gap, we present a microservice architecture that encapsulate","category":"Paper","link":"https://arxiv.org/abs/2605.18818","source":"arXiv AI","badge":"📜"},{"date":"2026-05-20","title":"AgentNLQ: A General-Purpose Agent for Natural Language to SQL","description":"arXiv:2605.19010v1 Announce Type: new \nAbstract: Natural language to SQL (NL2SQL) conversion is an important problem for researchers and enterprises due to the ubiquitous importance of relational databases in broad-ranging practical problems. Despite the rapid advancements in the capabilities of LLM","category":"Paper","link":"https://arxiv.org/abs/2605.19010","source":"arXiv AI","badge":"📜"},{"date":"2026-05-20","title":"Embedding by Elicitation: Dynamic Representations for Bayesian Optimization of System Prompts","description":"arXiv:2605.19093v1 Announce Type: new \nAbstract: System prompts are a central control mechanism in modern AI systems, shaping behavior across conversations, tasks, and user populations. Yet they are difficult to tune when feedback is available only as aggregate metrics rather than per-example labels","category":"Paper","link":"https://arxiv.org/abs/2605.19093","source":"arXiv AI","badge":"📜"},{"date":"2026-05-20","title":"DecisionBench: A Benchmark for Emergent Delegation in Long-Horizon Agentic Workflows","description":"arXiv:2605.19099v1 Announce Type: new \nAbstract: We introduce DecisionBench, a benchmark substrate for emergent delegation in long-horizon agentic workflows. The substrate fixes a task suite (GAIA, tau-bench, BFCL multi-turn), a peer-model pool (11 models, 7 vendor families), a delegation interface ","category":"Paper","link":"https://arxiv.org/abs/2605.19099","source":"arXiv AI","badge":"📜"},{"date":"2026-05-20","title":"Kunal vs Motorcycle | With ChatGPT","description":"Kickstart your projects with ChatGPT\n\nCredits\nDirector: Abhinav Pratiman\nDOP: Tassaduq Hussain\nProduction House: Early Man Film\nCreative agency: Hue & Why","category":"News","link":"https://www.youtube.com/watch?v=_BY9YTTh6kE","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-19","title":"Google just redesigned the search box for the first time in 25 years — here’s why it matters more than you think.","description":"<p>For a quarter century, the Google search box has been one of the most recognizable interfaces in computing: a thin white rectangle, a blinking cursor, a few typed words, and a list of blue links. On Tuesday, Google will formally retire that paradigm.</p><p>At its annual <a href=\"https://io.google","category":"News","link":"https://venturebeat.com/technology/google-just-redesigned-the-search-box-for-the-first-time-in-25-years-heres-why-it-matters-more-than-you-think","source":"VentureBeat AI","badge":"🔥"},{"date":"2026-05-19","title":"Non Sei Rimasto Indietro (Ancora): Capirai TUTTA l'AI in 29 Minuti","description":"Non sei rimasto indietro sull'intelligenza artificiale. Sei solo stato lasciato senza le basi. In questo video ti spiego TUTTI i 27 concetti fondamentali dell'AI in 27 minuti — da cos'è un LLM, ai token, alle allucinazioni, fino agli agenti AI e all'MCP. Niente tecnichese, niente fuffa: solo il mode","category":"News","link":"https://www.youtube.com/watch?v=mdpSRoOOl8E","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-05-18","title":"OpenAI and Dell partner to bring Codex to hybrid and on-premise enterprise environments","description":"OpenAI and Dell partner to bring Codex to hybrid and on-premise environments, helping enterprises deploy AI coding agents securely across data and workflows.","category":"News","link":"https://openai.com/index/dell-codex-enterprise-partnership","source":"OpenAI","badge":"🔥"},{"date":"2026-05-16","title":"OpenAI and Malta partner to bring ChatGPT Plus to all citizens","description":"OpenAI and Malta partner to expand AI access, offering ChatGPT Plus and training to help citizens build practical AI skills and use AI responsibly.","category":"News","link":"https://openai.com/index/malta-chatgpt-plus-partnership","source":"OpenAI","badge":"🔥"},{"date":"2026-05-15","title":"A new personal finance experience in ChatGPT","description":"Preview a new personal finance experience in ChatGPT for Pro users in the U.S. Securely connect your financial accounts and get AI-powered insights and guidance grounded in your financial context, goals, and priorities.","category":"News","link":"https://openai.com/index/personal-finance-chatgpt","source":"OpenAI","badge":"🔥"},{"date":"2026-05-15","title":"Databricks brings GPT-5.5 to enterprise agent workflows","description":"Databricks uses GPT-5.5 for enterprise agent workflows after the model set a new state of the art on the OfficeQA Pro benchmark.","category":"News","link":"https://openai.com/index/databricks","source":"OpenAI","badge":"🔥"},{"date":"2026-05-15","title":"Further Notes on Our Recent Research on AI Delegation and Long-Horizon Reliability","description":"<p>Our recent paper, “LLMs Corrupt Your Documents When You Delegate”, has generated discussion about the reliability of AI systems in delegated workflows. We appreciate the interest in this work and want to clarify several important points about what the paper does—and does not—claim. The research a","category":"News","link":"https://www.microsoft.com/en-us/research/blog/further-notes-on-our-recent-research-on-ai-delegation-and-long-horizon-reliability/","source":"Microsoft Research","badge":"🔥"},{"date":"2026-05-15","title":"Il Growth Hack più Oscuro della Storia dell’IA","description":"Il Growth Hack più Oscuro della Storia dell’IA perché Grok, l’intelligenza artificiale di Elon Musk, è finita al centro di uno degli scandali AI più inquietanti degli ultimi anni: milioni di immagini sessualizzate generate senza consenso, accuse contro xAI, indagini internazionali e un risultato par","category":"News","link":"https://www.youtube.com/shorts/ObMEYWfJWGY","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-05-14","title":"Codex for Everyday Work: AI Agents Beyond Coding","description":"Codex began as a tool for developers. Today, people are using it for much more: research, planning, file organization, automation, data analysis, presentations, and other everyday knowledge work.\n\nIn this OpenAI Forum conversation, Chris Nicholson of OpenAI Global Affairs speaks with Thibault Sottia","category":"News","link":"https://www.youtube.com/watch?v=DLP9CagE3dU","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-14","title":"Now in preview: Codex in the ChatGPT mobile app.","description":"Codex is rolling out in preview in the ChatGPT mobile app on iOS and Android.\n\nIn this demo, see how you can start, steer, unblock, and review Codex work from your phone while Codex keeps running on your computer, Mac mini, devbox, or managed remote environment, with your files and project context s","category":"News","link":"https://www.youtube.com/shorts/tk9qrk5G4RQ","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-14","title":"Inside image generation’s Renaissance moment — the OpenAI Podcast Ep. 19","description":"People are generating over 1.5 billion images a week in ChatGPT. In this episode, Product lead Adele Li and researcher Kenji Hata share some of the new use cases and trends since the launch of Images 2.0. \n\nTogether with host Andrew Mayne, they trace the progress from the early DALL-E days and dive ","category":"News","link":"https://www.youtube.com/watch?v=bH2nP-aCFjk","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2025-07-30","title":"Newsletter BitAgora","description":"Selezione articoli IA","category":"Tool","link":"https://newsletter.bitagoraorobica.it/tag/ia/","source":"BitAgorà Orobica","badge":""}];

    const searchInput = document.getElementById('search');
    const categoryFilter = document.getElementById('category');
    const sourceFilter = document.getElementById('source');
    const daysFilter = document.getElementById('days');
    const toggleDark = document.getElementById('toggleDark');
    const resetFilters = document.getElementById('resetFilters');
    const entriesDiv = document.getElementById('entries');

    function createEntry(item) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.text = (item.title + ' ' + item.description).toLowerCase();
      div.dataset.category = item.category;
      div.dataset.source = item.source;
      div.dataset.date = item.date;
      div.innerHTML = `
        <a href="${item.link}" class="title" target="_blank">
          <span class="badge">${item.badge}</span>${item.title}
        </a>
        <p>${item.description}</p>
        <div class="meta">${item.source} – ${item.date} – ${item.category}</div>
      `;
      return div;
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const src = sourceFilter.value;
      const days = parseInt(daysFilter.value);
      const now = new Date();

      entriesDiv.innerHTML = "";
entryData.forEach(item => {
  const entryDate = new Date(item.date);
  const diffDays = (now - entryDate) / (1000 * 60 * 60 * 24);
  if (
    (!q || (item.title + item.description).toLowerCase().includes(q)) &&
    (!cat || item.category === cat) &&
    (!src || item.source === src) &&
    (isNaN(days) || diffDays <= days)
  ) {
    const el = createEntry(item);
    entriesDiv.appendChild(el);
    // trigger animazione
    requestAnimationFrame(() => el.classList.add("show"));
  }
});

      
      
    }

    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "";
      sourceFilter.value = "";
      daysFilter.value = "";
      render();
    });

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sourceFilter.addEventListener("change", render);
    daysFilter.addEventListener("change", render);
    toggleDark.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>
</body>
</html>
