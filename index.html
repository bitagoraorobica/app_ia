<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>AI Compass – BitAgorà Orobica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #eef1f5;
      padding: 1em;
      margin: 0;
      transition: background 0.3s, color 0.3s;
    }
    body.dark {
      background: #181818;
      color: #e0e0e0;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2em;
      text-align: center;
    }
    header h1 {
      font-size: 2em;
      margin: 0.5em 0;
    }
    header img {
      max-width: 100%;
      height: auto;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1em;
      justify-content: center;
      margin-bottom: 2em;
    }
    .controls input,
    .controls select,
    .controls button {
      font-size: 1em;
      padding: 0.5em;
      flex: 1 1 200px;
      max-width: 300px;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border 0.3s;
    }
    .controls input:hover,
    .controls select:hover {
      border-color: #007acc;
    }
    .entry {
      background: #ffffff;
      border-radius: 12px;
      padding: 1em;
      margin-bottom: 1.5em;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-left: 4px solid transparent;
    }
    .entry[data-category="News"] {
      border-left-color: #007acc;
    }
    .entry[data-category="Paper"] {
      border-left-color: #e67e22;
    }
    .entry[data-category="Course"] {
      border-left-color: #27ae60;
    }
    .entry[data-category="Automation"] {
      border-left-color: #9b59b6; /* viola brillante */
    }
    body.dark .entry {
      background: #1e1e1e;
    }
    .entry .title {
      font-size: 1.2em;
      font-weight: bold;
      color: #007acc;
      text-decoration: none;
      display: block;
      margin-bottom: 0.5em;
    }
    body.dark .title {
      color: #4fc3f7;
    }
    .entry p {
      margin: 0.5em 0;
      line-height: 1.4;
    }
    .entry .meta {
      font-size: 0.85em;
      color: #666;
      margin-top: 0.5em;
    }
    body.dark .meta {
      color: #aaa;
    }
    .entry .badge {
      margin-right: 0.5em;
      font-size: 1.2em;
    }
    @media (max-width: 600px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      .controls input,
      .controls select,
      .controls button {
        flex: 1 1 auto;
        max-width: 100%;
      }
    }
    
    .entries-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5em;
    }
    @media (min-width: 700px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (min-width: 1000px) {
  .entries-grid {
    grid-template-columns: 1fr 1fr 1fr;
  }
}
.entry {
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.5s ease;
  opacity: 0;
}
.entry.show {
  opacity: 1;
}
.entry:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
}
  
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Compass</h1>
    <img src="logo.png" alt="Logo">
  </header>
  <p><em>Selezione curata da <a href="https://www.bitagoraorobica.it" target="_blank">BitAgorà Orobica srl</a></em></p>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca per titolo o descrizione...">
    <select id="category">
      <option value="">Tutte le categorie</option>
      <option value="News">News</option>
      <option value="Paper">Paper</option>
      <option value="Course">Course</option>
      <option value="Automation">Automation</option>
    </select>
    <select id="source">
      <option value="">Tutte le fonti</option>
      <option value="BitAgorà Orobica">BitAgorà Orobica</option>
      <option value="YouTube - Gabry Solutions">YouTube - Gabry Solutions</option>
      <option value="YouTube – OpenAI">YouTube – OpenAI</option>
      <option value="YouTube – Raffaele Gaito">YouTube – Raffaele Gaito</option>
      <option value="arXiv AI">arXiv AI</option>
    </select>
    <select id="days">
      <option value="">Qualsiasi data</option>
      <option value="7">Ultimi 7 giorni</option>
      <option value="15">Ultimi 15 giorni</option>
      <option value="30">Ultimi 30 giorni</option>
    </select>
    <button id="toggleDark">🌗 Modalità scura</button>
    <button id="resetFilters">🔄 Reset filtri</button>
  </div>

  <div id="entries" class="entries-grid"></div>

gies, ","category":"Paper","link":"https://arxiv.org/abs/2605.30738","source":"arXiv AI","badge":"📜"},{"date":"2026-06-01","title":"Learning Agent-Compatible Context Management for Long-Horizon Tasks","description":"arXiv:2605.30785v1 Announce Type: new \nAbstract: LLM agents increasingly face long-horizon tasks such as web search and deep research in real-world applications, where accumulated context can cause long-context degradation and reasoning failures. Prior work mitigates this through context management ","category":"Paper","link":"https://arxiv.org/abs/2605.30785","source":"arXiv AI","badge":"📜"},{"date":"2026-06-01","title":"Il grande errore con l'IA che fanno troppi (anche tu?)","description":"Compra il mio libro \"In cosa posso esserti utile?\", una guida molto pratica e poco emotiva all'IA https://amzn.to/4aMZrUX\n\nCompra il mio corso \"Crea un Agente AI con Claude Code\": https://www.raffaelegaito.com/claude-code-crea-agente-ai-corso-completo/?landing=true\n\nCon una tecnologia così potente c","category":"News","link":"https://www.youtube.com/watch?v=_uAOpAzen2o","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-05-31","title":"Le 6 Regole per Prompt Perfetti - Il Metodo di un Ingegnere AI","description":"Le 6 Regole per Prompt Perfetti - Il Metodo di un Ingegnere AI\nVuoi ottenere il massimo da ChatGPT e dall'Intelligenza Artificiale nel 2026? Smetti di usare i vecchi prompt generici e impara a comunicare con l'AI come un vero professionista. In questo video, ti mostro il framework definitivo in 6 st","category":"News","link":"https://www.youtube.com/shorts/MEWo8lWfHGY","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-05-30","title":"Opus 4.8 - Tutto quello che devi sapere","description":"Compra il mio corso \"Crea un Agente AI con Claude Code\": https://www.raffaelegaito.com/claude-code-crea-agente-ai-corso-completo/?landing=true\n\nCompra il mio libro \"In cosa posso esserti utile?\", una guida molto pratica e poco emotiva all'IA https://amzn.to/4aMZrUX\n\nAnthropic ha annunciato Claude Op","category":"News","link":"https://www.youtube.com/watch?v=VuVXazZSBIc","source":"YouTube – Raffaele Gaito","badge":"🔥"},{"date":"2026-05-30","title":"Come Usare ChatGPT Così Bene Che Sembra ILLEGALE (Senza Competenze Tecniche)","description":"Come Usare ChatGPT Così Bene Che Sembra ILLEGALE (Senza Competenze Tecniche) Nessuno ne parla, ma esiste un framework per scrivere prompt su ChatGPT che è letteralmente \"illegale\". Si chiama Context Engineering ed è il nuovo standard utilizzato dai professionisti per ottenere risposte superiori del ","category":"News","link":"https://www.youtube.com/shorts/knIuzuqtgCM","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-05-29","title":"These Models are Crazy!","description":"\"It's taking me minutes and hours to do things that took teams weeks and months,\" - Lauren Steinberg, Loblaw Companies Limited.\n\nLauren, Chief Digital Officer at 🇨🇦 Canada’s largest retailer, shared how Codex and ChatGPT Images 2.0 are helping her team move faster, rethink workflows, and deliver bet","category":"News","link":"https://www.youtube.com/shorts/JA3tmYqCacA","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-29","title":"Loblaw Ships Faster with Codex","description":"Lauren, Chief Digital Officer at 🇨🇦 Canada’s largest retailer, shared how Codex and ChatGPT Images 2.0 are helping her team move faster, rethink workflows, and deliver better customer experiences.\n\nBuild with Codex ➡️ https://openai.com/codex/","category":"News","link":"https://www.youtube.com/watch?v=EYvzpZX2-Ww","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-28","title":"How Abridge uses GPT-5.5 for clinical decision support","description":"At the point of care, more context usually means more complexity.\n\nChaitanya Asawa from Abridge shares how GPT-5.5 helps synthesize patient context, live clinical conversations, and medical information through stronger reasoning and tool use, helping clinicians get denser, more useful information wh","category":"News","link":"https://www.youtube.com/watch?v=tXBRYPpIvms","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-28","title":"NON usare ChatGPT per tutto (Usa questi invece)","description":"NON usare ChatGPT per tutto (Usa questi invece)\n\nSmetti di usare ChatGPT per ogni singola attività. Nel 2026, l'intelligenza artificiale si è iper-specializzata: usare un solo strumento per fare tutto significa perdere efficienza e qualità.\n\nIn questo video ti mostro esattamente quali sono le altern","category":"News","link":"https://www.youtube.com/shorts/lflAuoKPLQY","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2026-05-26","title":"Sid vs Career | With ChatGPT","description":"Expertise at your fingertips with ChatGPT\n\nCredits\nDirector: Abhinav Pratiman\nDOP: Tassaduq Hussain\nProduction House: Early Man Film\nCreative agency: Hue & Why","category":"News","link":"https://www.youtube.com/watch?v=KHasJMg4zV4","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-22","title":"Workspace agents in ChatGPT: Admin and builder controls","description":"Workspace agents in ChatGPT help teams turn repeatable workflows into shared agents that can pull in context, use tools, and move work forward on their own.\n\nIn this demo, you’ll see how admins and builders can set safeguards for workspace agents. Enterprise admins can centrally manage who can use, ","category":"News","link":"https://www.youtube.com/watch?v=HaaKUFAOi84","source":"YouTube – OpenAI","badge":"🔥"},{"date":"2026-05-22","title":"8 Cose ASSURDE che ho creato con l'AI in 16 minuti (senza una riga di codice)","description":"8 Cose ASSURDE che ho creato con l'AI in 16 minuti (senza una riga di codice) e In questo video ti mostro 8 casi d'uso reali per sfruttare Claude Design, il nuovo tool di Anthropic che sta rivoluzionando la creazione visiva con l'intelligenza artificiale. \n\nDimentica la teoria: andiamo dritti alla p","category":"News","link":"https://www.youtube.com/watch?v=p7KfFll5tEc","source":"YouTube - Gabry Solutions","badge":"🔥"},{"date":"2025-07-30","title":"Newsletter BitAgora","description":"Selezione articoli IA","category":"Tool","link":"https://newsletter.bitagoraorobica.it/tag/ia/","source":"BitAgorà Orobica","badge":""}];

    const searchInput = document.getElementById('search');
    const categoryFilter = document.getElementById('category');
    const sourceFilter = document.getElementById('source');
    const daysFilter = document.getElementById('days');
    const toggleDark = document.getElementById('toggleDark');
    const resetFilters = document.getElementById('resetFilters');
    const entriesDiv = document.getElementById('entries');

    function createEntry(item) {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.text = (item.title + ' ' + item.description).toLowerCase();
      div.dataset.category = item.category;
      div.dataset.source = item.source;
      div.dataset.date = item.date;
      div.innerHTML = `
        <a href="${item.link}" class="title" target="_blank">
          <span class="badge">${item.badge}</span>${item.title}
        </a>
        <p>${item.description}</p>
        <div class="meta">${item.source} – ${item.date} – ${item.category}</div>
      `;
      return div;
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const src = sourceFilter.value;
      const days = parseInt(daysFilter.value);
      const now = new Date();

      entriesDiv.innerHTML = "";
entryData.forEach(item => {
  const entryDate = new Date(item.date);
  const diffDays = (now - entryDate) / (1000 * 60 * 60 * 24);
  if (
    (!q || (item.title + item.description).toLowerCase().includes(q)) &&
    (!cat || item.category === cat) &&
    (!src || item.source === src) &&
    (isNaN(days) || diffDays <= days)
  ) {
    const el = createEntry(item);
    entriesDiv.appendChild(el);
    // trigger animazione
    requestAnimationFrame(() => el.classList.add("show"));
  }
});

      
      
    }

    resetFilters.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "";
      sourceFilter.value = "";
      daysFilter.value = "";
      render();
    });

    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    sourceFilter.addEventListener("change", render);
    daysFilter.addEventListener("change", render);
    toggleDark.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>
</body>
</html>
